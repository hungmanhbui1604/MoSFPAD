general:
  seed: 42

wandb:
  api_key: null
  project: "MoSFPAD"

data:
  split_path: "data/pad_splits.json"
  transform_name: "mosfpad"

training:
  epochs: 300
  batch_size: 128
  num_workers: 8
  pin_memory: true
  checkpoint_interval: 100

model:
  model_name: "mosfpad"
  pretrained: true
  num_classes: 1
  ckpt_path: null

loss:
  C: 1.0

optimizer:
  opt_name: "adam"
  lr: 1.0e-4
  weight_decay: 4.0e-4

scheduler:
  sched_name: "cosine"
  warmup_epochs: 15
  min_lr: 1.0e-5

output:
  checkpoint_dir: "ckpts/"
  best_model_name: "best_model.pth"

evaluation:
  batch_size: 128
